<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity Heatmap — News Distribution</title>
  <link rel="stylesheet" href="/css/dashboard-shared.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/heatmap.js/2.0.2/heatmap.min.js"></script>
  <script src="/js/api.js"></script>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <a href="/admin/dashboard.html" class="sidebar-brand">
      <img src="/images/logo.png" alt="Logo" class="sidebar-brand-logo">
      <div class="sidebar-brand-text">News<span>Distribution</span></div>
    </a>

    <div class="nav-section">
      <div class="nav-section-label">Quản trị</div>
      <div class="nav-links">
        <a href="/admin/dashboard.html" class="nav-item">
          <i data-lucide="layout-dashboard" class="nav-icon"></i>
          <span>Dashboard</span>
        </a>
        <a href="/admin/ai-forecast.html" class="nav-item">
          <i data-lucide="brain-circuit" class="nav-icon"></i>
          <span>Dự báo AI</span>
        </a>
        <a href="/admin/heatmap.html" class="nav-item active">
          <i data-lucide="flame" class="nav-icon"></i>
          <span>Bản đồ Click</span>
        </a>
      </div>
    </div>

    <div class="nav-logout">
      <button class="nav-item" onclick="logout()">
        <i data-lucide="log-out" class="nav-icon"></i>
        <span>Đăng xuất</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-content">
    <div class="page-header">
      <div class="page-header-left">
        <h1>Bản đồ tương tác Heatmap</h1>
        <p class="page-subtitle">Trực quan hóa các điểm được click nhiều nhất bởi người dùng đại lý</p>
      </div>
    </div>

    <div class="toolbar">
      <div class="toolbar-group">
        <i data-lucide="monitor" style="width:16px;height:16px;color:var(--text-muted)"></i>
        <label>Trang cần xem:</label>
        <div class="btn-group">
          <button class="active" onclick="setPage('/agency/dashboard', event)">Dashboard</button>
          <button onclick="setPage('/agency/orders', event)">Đơn hàng</button>
          <button onclick="setPage('/agency/publications', event)">Danh mục báo</button>
        </div>
      </div>

      <div class="toolbar-group">
        <i data-lucide="calendar" style="width:16px;height:16px;color:var(--text-muted)"></i>
        <label>Từ ngày:</label>
        <input type="date" id="dateFrom" value="2026-01-01">
      </div>

      <div class="toolbar-group">
        <label>Đến ngày:</label>
        <input type="date" id="dateTo">
      </div>

      <button class="btn btn-primary btn-sm" onclick="loadHeatmap()">
        <i data-lucide="map-pin"></i>
        Hiển Thị Bản Đồ
      </button>
    </div>

    <div class="stats-row" id="stats-row" style="display:none">
      <div class="stat-box">
        <div class="n" id="stat-total">—</div>
        <div class="l">Tổng số Click</div>
      </div>
      <div class="stat-box">
        <div class="n" id="stat-zones">—</div>
        <div class="l">Vùng tương tác ghi nhận</div>
      </div>
      <div class="stat-box">
        <div class="n" id="stat-top">—</div>
        <div class="l">Element click nhiều nhất</div>
      </div>
    </div>

    <div id="heatmap-wrapper">
      <iframe class="page-frame" id="pageFrame" src="/agency/dashboard.html" scrolling="no"></iframe>
      <div id="heatmap-layer"></div>
    </div>
  </div>

  <script>
    lucide.createIcons();
    requireAuth('ADMIN_WEB');

    let currentPage = '/agency/dashboard';
    let heatmapInstance = null;

    document.getElementById('dateTo').value = new Date().toISOString().split('T')[0];

    function setPage(page, event) {
      currentPage = page;
      document.getElementById('pageFrame').src = page + '.html';
      
      const buttons = event.target.parentNode.querySelectorAll('button');
      buttons.forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      
      // Auto reload heatmap if already shown
      if (document.getElementById('stats-row').style.display !== 'none') {
        setTimeout(loadHeatmap, 500);
      }
    }

    async function loadHeatmap() {
      const from = document.getElementById('dateFrom').value;
      const to = document.getElementById('dateTo').value;

      const data = await apiGet(`/admin/analytics/heatmap?page=${encodeURIComponent(currentPage)}&from=${from}&to=${to}`);
      if (!data) return;

      const wrapper = document.getElementById('heatmap-wrapper');
      const W = wrapper.offsetWidth;
      const H = wrapper.offsetHeight;

      const scaledData = data.map(d => ({
        x: Math.round((d.element_x / 1920) * W),
        y: Math.round((d.element_y / 1080) * H),
        value: d.count
      })).filter(d => d.x > 0 && d.y > 0);

      // Show stats
      document.getElementById('stats-row').style.display = 'grid';
      const totalClicks = data.reduce((s, d) => s + d.count, 0);
      const topElement = data.sort((a,b) => b.count - a.count)[0];
      
      document.getElementById('stat-total').textContent = totalClicks.toLocaleString('vi-VN');
      document.getElementById('stat-zones').textContent = data.length.toLocaleString('vi-VN');
      document.getElementById('stat-top').textContent = topElement ? topElement.element_id : '—';

      const maxVal = scaledData.length > 0 ? Math.max(...scaledData.map(d => d.value)) : 1;

      document.getElementById('heatmap-layer').innerHTML = '';
      
      heatmapInstance = h337.create({
        container: document.getElementById('heatmap-layer'),
        maxOpacity: 0.75,
        radius: 35,
        blur: 0.75,
      });

      heatmapInstance.setData({ 
        max: maxVal, 
        data: scaledData 
      });
    }

    document.getElementById('pageFrame').onload = () => {
      if (heatmapInstance === null) {
        loadHeatmap();
      }
    };
  </script>
</body>
</html>
