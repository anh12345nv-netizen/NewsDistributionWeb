<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accountant Dashboard — News Distribution</title>
  <link rel="stylesheet" href="/css/dashboard-shared.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* Chart Section specific to Accountant */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .chart-container {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      height: 350px;
      position: relative;
    }
    
    .full-width-chart {
      grid-column: 1 / -1;
      height: 400px;
    }

    .table-container {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      overflow-x: auto;
      display: none;
    }

    .nav-item.active {
      background: var(--nav-hover);
      color: var(--accent-blue);
      border-right: 3px solid var(--accent-blue);
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <a href="/accountant/dashboard.html" class="sidebar-brand">
      <img src="/images/logo.png" alt="Logo" class="sidebar-brand-logo">
      <div class="sidebar-brand-text">News<span>Distribution</span></div>
    </a>

    <div class="nav-section">
      <div class="nav-section-label">Kế toán</div>
      <div class="nav-links">
        <a href="#" class="nav-item active" onclick="showOverview(this)">
          <i data-lucide="pie-chart" class="nav-icon"></i>
          <span>Thống kê tổng quan</span>
        </a>
        <a href="#" class="nav-item" onclick="loadTable('m_hoa_don', this)">
          <i data-lucide="receipt" class="nav-icon"></i>
          <span>Hóa đơn</span>
        </a>
        <a href="#" class="nav-item" onclick="loadTable('m_khach_hang', this)">
          <i data-lucide="users" class="nav-icon"></i>
          <span>Khách hàng</span>
        </a>
        <a href="#" class="nav-item" onclick="loadTable('m_ton_kho', this)">
          <i data-lucide="package" class="nav-icon"></i>
          <span>Tồn kho</span>
        </a>
        <a href="#" class="nav-item" onclick="loadTable('m_bao', this)">
          <i data-lucide="newspaper" class="nav-icon"></i>
          <span>Danh mục Báo</span>
        </a>
      </div>
    </div>

    <div class="nav-logout">
      <button class="nav-item" onclick="logout()">
        <i data-lucide="log-out" class="nav-icon"></i>
        <span>Đăng xuất</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-content">
    <div class="page-header">
      <div class="page-header-left">
        <h1 id="page-title">Thống kê Kế toán</h1>
        <p class="page-subtitle" id="page-subtitle">Biểu đồ phân tích dữ liệu tổng hợp từ Master DB</p>
      </div>
      
      <div class="user-profile-pill">
        <div class="user-avatar" id="acc-avatar">K</div>
        <span id="acc-name">Kế Toán</span>
      </div>
    </div>

    <!-- Overview Section (Stats + Charts) -->
    <div id="overview-section">
      <!-- Stats Grid -->
      <div class="stats-grid">
        <div class="stat-card blue">
          <div class="stat-icon-box blue">
            <i data-lucide="receipt"></i>
          </div>
          <div class="stat-info">
            <div class="stat-label">Tổng Hóa Đơn</div>
            <div class="stat-value" id="val-hoadon">—</div>
          </div>
        </div>
        <div class="stat-card purple">
          <div class="stat-icon-box purple">
            <i data-lucide="users"></i>
          </div>
          <div class="stat-info">
            <div class="stat-label">Khách Hàng</div>
            <div class="stat-value" id="val-khachhang">—</div>
          </div>
        </div>
        <div class="stat-card green">
          <div class="stat-icon-box green">
            <i data-lucide="package"></i>
          </div>
          <div class="stat-info">
            <div class="stat-label">Tồn Kho</div>
            <div class="stat-value" id="val-tonkho">—</div>
          </div>
        </div>
        <div class="stat-card orange">
          <div class="stat-icon-box orange">
            <i data-lucide="newspaper"></i>
          </div>
          <div class="stat-info">
            <div class="stat-label">Danh Mục Báo</div>
            <div class="stat-value" id="val-bao">—</div>
          </div>
        </div>
      </div>

      <!-- Charts Grid -->
      <div class="charts-grid">
        <div class="chart-container full-width-chart">
          <canvas id="mainBarChart"></canvas>
        </div>
        <div class="chart-container">
          <canvas id="doughnutChart"></canvas>
        </div>
        <div class="chart-container">
          <canvas id="lineChart"></canvas>
        </div>
      </div>
    </div>

    <!-- Table Section -->
    <div id="table-section" class="table-container">
      <div id="table-loading" style="text-align:center; padding:30px; color:var(--text-muted);">
        <i data-lucide="loader" class="animate-spin"></i> Đang tải dữ liệu...
      </div>
      <table class="data-table" id="data-table" style="display:none;">
        <thead id="data-thead"></thead>
        <tbody id="data-tbody"></tbody>
      </table>
    </div>

  </div>

  <script>
    lucide.createIcons();
    
    // Check Authentication
    const token = localStorage.getItem('accessToken');
    const role = localStorage.getItem('role');
    
    if (!token || role !== 'ACCOUNTANT') {
      window.location.href = '/login.html';
    } else {
      const tenHienThi = localStorage.getItem('tenHienThi') || 'Kế Toán';
      document.getElementById('acc-name').innerText = tenHienThi;
      document.getElementById('acc-avatar').innerText = tenHienThi.charAt(0).toUpperCase();
      
      // Load Stats on Init
      fetchOverviewStats();
    }

    function logout() {
      localStorage.clear();
      window.location.href = '/login.html';
    }

    function setActiveMenu(element) {
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      if (element) {
        element.classList.add('active');
      }
    }

    function showOverview(element) {
      setActiveMenu(element);
      document.getElementById('page-title').innerText = 'Thống kê Kế toán';
      document.getElementById('page-subtitle').innerText = 'Biểu đồ phân tích dữ liệu tổng hợp từ Master DB';
      document.getElementById('overview-section').style.display = 'block';
      document.getElementById('table-section').style.display = 'none';
    }

    let barChartInstance = null;
    let doughnutChartInstance = null;
    let lineChartInstance = null;

    Chart.defaults.color = '#94a3b8';
    Chart.defaults.borderColor = 'rgba(255, 255, 255, 0.05)';

    async function fetchOverviewStats() {
      try {
        const response = await fetch('/api/accountant/stats/overview', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (response.status === 401 || response.status === 403) {
          logout(); return;
        }
        const data = await response.json();
        
        document.getElementById('val-hoadon').innerText = data['m_hoa_don'] || 0;
        document.getElementById('val-khachhang').innerText = data['m_khach_hang'] || 0;
        document.getElementById('val-tonkho').innerText = data['m_ton_kho'] || 0;
        document.getElementById('val-bao').innerText = data['m_bao'] || 0;

        renderCharts(data);
      } catch (error) {
        console.error("Error fetching stats:", error);
      }
    }

    function renderCharts(data) {
      const hd = data['m_hoa_don'] || 0;
      const kh = data['m_khach_hang'] || 0;
      const tk = data['m_ton_kho'] || 0;
      const bao = data['m_bao'] || 0;

      // 1. Bar Chart
      const ctxBar = document.getElementById('mainBarChart').getContext('2d');
      if (barChartInstance) barChartInstance.destroy();
      
      let gradientBar = ctxBar.createLinearGradient(0, 0, 0, 400);
      gradientBar.addColorStop(0, 'rgba(59, 130, 246, 0.8)');   
      gradientBar.addColorStop(1, 'rgba(59, 130, 246, 0.1)');

      barChartInstance = new Chart(ctxBar, {
        type: 'bar',
        data: {
          labels: ['Hóa đơn', 'Khách hàng', 'Tồn kho', 'Báo'],
          datasets: [{
            label: 'Tổng số lượng bản ghi',
            data: [hd, kh, tk, bao],
            backgroundColor: gradientBar,
            borderColor: '#3b82f6',
            borderWidth: 1,
            borderRadius: 6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            title: { display: true, text: 'Tổng quan Dữ liệu Hệ thống', color: '#f8fafc', font: {size: 16} }
          }
        }
      });

      // 2. Doughnut Chart
      const ctxDoughnut = document.getElementById('doughnutChart').getContext('2d');
      if (doughnutChartInstance) doughnutChartInstance.destroy();
      
      doughnutChartInstance = new Chart(ctxDoughnut, {
        type: 'doughnut',
        data: {
          labels: ['Hóa đơn', 'Khách hàng', 'Tồn kho'],
          datasets: [{
            data: [hd, kh, tk],
            backgroundColor: [
              'rgba(168, 85, 247, 0.8)', // Purple
              'rgba(34, 197, 94, 0.8)',  // Green
              'rgba(249, 115, 22, 0.8)'  // Orange
            ],
            borderColor: '#1e293b',
            borderWidth: 2
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            title: { display: true, text: 'Tỷ lệ Phân bổ Dữ liệu', color: '#f8fafc' },
            legend: { position: 'bottom' }
          }
        }
      });

      // 3. Line Chart (Mock Trend)
      const ctxLine = document.getElementById('lineChart').getContext('2d');
      if (lineChartInstance) lineChartInstance.destroy();

      let gradientLine = ctxLine.createLinearGradient(0, 0, 0, 300);
      gradientLine.addColorStop(0, 'rgba(34, 197, 94, 0.4)');
      gradientLine.addColorStop(1, 'rgba(34, 197, 94, 0.0)');

      lineChartInstance = new Chart(ctxLine, {
        type: 'line',
        data: {
          labels: ['T1', 'T2', 'T3', 'T4', 'T5', 'T6'],
          datasets: [{
            label: 'Biến động Doanh số (Mô phỏng)',
            data: [12, 19, 15, 25, 22, 30],
            borderColor: '#22c55e',
            backgroundColor: gradientLine,
            fill: true,
            tension: 0.4,
            borderWidth: 2,
            pointBackgroundColor: '#22c55e'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            title: { display: true, text: 'Xu hướng Doanh số', color: '#f8fafc' },
            legend: { display: false }
          },
          scales: {
            x: { grid: { display: false } }
          }
        }
      });
    }

    async function loadTable(tableName, element) {
      setActiveMenu(element);
      
      let title = tableName;
      if(tableName === 'm_hoa_don') title = 'Hóa Đơn';
      if(tableName === 'm_khach_hang') title = 'Khách Hàng';
      if(tableName === 'm_ton_kho') title = 'Tồn Kho';
      if(tableName === 'm_bao') title = 'Danh mục Báo';

      document.getElementById('page-title').innerText = 'Bảng dữ liệu: ' + title;
      document.getElementById('page-subtitle').innerText = 'Hiển thị Top 100 dòng mới nhất của ' + tableName;
      
      document.getElementById('overview-section').style.display = 'none';
      document.getElementById('table-section').style.display = 'block';
      
      const thead = document.getElementById('data-thead');
      const tbody = document.getElementById('data-tbody');
      const loading = document.getElementById('table-loading');
      const tableEl = document.getElementById('data-table');
      
      thead.innerHTML = '';
      tbody.innerHTML = '';
      tableEl.style.display = 'none';
      loading.style.display = 'block';
      loading.innerHTML = '<i data-lucide="loader" class="animate-spin"></i> Đang tải dữ liệu...';
      lucide.createIcons();

      try {
        const response = await fetch('/api/accountant/tables/' + tableName, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        
        if (response.status === 401 || response.status === 403) {
          logout(); return;
        }
        
        const data = await response.json();
        loading.style.display = 'none';
        tableEl.style.display = 'table';

        if (!data || data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="100%" style="text-align:center;">Không có dữ liệu</td></tr>';
          return;
        }

        const keys = Object.keys(data[0]);
        let headRow = '<tr>';
        keys.forEach(k => { headRow += `<th>${k}</th>`; });
        headRow += '</tr>';
        thead.innerHTML = headRow;

        let bodyHtml = '';
        data.forEach(row => {
          bodyHtml += '<tr>';
          keys.forEach(k => { 
            bodyHtml += `<td>${row[k] !== null ? row[k] : ''}</td>`; 
          });
          bodyHtml += '</tr>';
        });
        tbody.innerHTML = bodyHtml;

      } catch (error) {
        console.error("Error loading table:", error);
        loading.innerHTML = '<span style="color:var(--accent-red)">Lỗi khi tải dữ liệu</span>';
      }
    }
  </script>
</body>
</html>
